name: CI

on:
  pull_request:
    branches:
      - main
      - "release/**"
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:
    inputs:
      run_bench:
        description: "Run the render perf bench job (informational, never gates)"
        required: false
        default: "false"

# Verify cancels stale PR / push runs in flight; deploy keeps its own group with
# cancel-in-progress disabled so a rapid second push to main cannot kill an
# in-flight production deploy mid-upload (per the iteration-17 stress test).
concurrency:
  group: ci-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PRODUCTION_URL: https://vibe-gear2.vercel.app

jobs:
  verify:
    name: Lint, typecheck, unit, e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Docs check
        run: npm run docs:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build for e2e
        run: npm run build

      - name: Bundle and Lighthouse quality gates
        run: npm run quality:gates

      - name: Playwright e2e
        run: npm run test:e2e

      - name: Cross-browser smoke
        run: npm run test:e2e:cross-browser

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  bench:
    name: Render perf bench (informational)
    needs: verify
    # Gated on workflow_dispatch with run_bench=true so the default pipeline
    # stays deterministic per AGENTS.md. continue-on-error so the bench can
    # never gate a merge or deploy.
    if: github.event_name == 'workflow_dispatch' && inputs.run_bench == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render bench
        run: npm run bench:render

  deploy:
    name: Verify Vercel production deploy
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Separate concurrency group with cancel-in-progress disabled: a queued
    # verification waits its turn instead of racing another production smoke.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Wait for Vercel Git deployment
        run: |
          expected="$(git rev-parse --short HEAD)"
          for attempt in {1..60}; do
            version="$(curl --fail --silent --show-error --max-time 5 "$PRODUCTION_URL/api/version" | node -e "let raw = ''; process.stdin.on('data', (chunk) => { raw += chunk; }); process.stdin.on('end', () => { try { console.log(JSON.parse(raw).version ?? ''); } catch { process.exit(1); } });" 2>/dev/null || true)"
            status="$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 5 "$PRODUCTION_URL" || true)"
            echo "attempt=$attempt status=$status version=$version expected=$expected"
            if [ "$status" = "200" ] && [ "$version" = "$expected" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Production did not report expected build id $expected" >&2
          exit 1
