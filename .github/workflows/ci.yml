name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_bench:
        description: "Run the render perf bench job (informational, never gates)"
        required: false
        default: "false"

# Verify cancels stale PR / push runs in flight; deploy keeps its own group with
# cancel-in-progress disabled so a rapid second push to main cannot kill an
# in-flight production deploy mid-upload (per the iteration-17 stress test).
concurrency:
  group: ci-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, unit, e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for e2e
        run: npm run build

      - name: Playwright e2e
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  bench:
    name: Render perf bench (informational)
    needs: verify
    # Gated on workflow_dispatch with run_bench=true so the default pipeline
    # stays deterministic per AGENTS.md. continue-on-error so the bench can
    # never gate a merge or deploy.
    if: github.event_name == 'workflow_dispatch' && inputs.run_bench == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render bench
        run: npm run bench:render

  deploy:
    name: Deploy to Vercel (production)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Separate concurrency group with cancel-in-progress disabled: a queued
    # deploy waits its turn instead of killing an in-flight one. Vercel can
    # leave aliasing in a confused state if a deploy upload is interrupted.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ steps.vercel-deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel CLI
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artefact
        id: vercel-deploy
        run: |
          url="$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "url=$url" >> "$GITHUB_OUTPUT"
